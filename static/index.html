<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>QueryMind - AI SQL Generator</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link
    href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&family=Fira+Code:wght@400;500&display=swap"
    rel="stylesheet">
  <link rel="stylesheet" href="/static/style.css">
</head>

<body>
  <!-- BACKGROUND EFFECTS -->
  <div class="bg-blur effect-1"></div>
  <div class="bg-blur effect-2"></div>

  <div class="app-container">

    <!-- SIDEBAR -->
    <aside class="sidebar glass-panel">
      <div class="sidebar-header">
        <h1>Query<span>Mind</span></h1>
        <p class="caption">AI-powered SQL generator</p>
      </div>

      <div class="config-section">
        <h3>Database Config</h3>
        <div class="input-group">
          <label for="db_host">Host</label>
          <input type="text" id="db_host" value="127.0.0.1">
        </div>
        <div class="input-group">
          <label for="db_port">Port</label>
          <input type="number" id="db_port" value="3306">
        </div>
        <div class="input-group">
          <label for="db_user">User</label>
          <input type="text" id="db_user" value="root">
        </div>
        <div class="input-group">
          <label for="db_password">Password</label>
          <input type="password" id="db_password" placeholder="••••••••">
        </div>
        <div class="input-group">
          <label for="db_name">Database</label>
          <input type="text" id="db_name" value="test">
        </div>
      </div>

      <div class="config-section">
        <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 16px;">
          <h3 style="margin-bottom: 0;">Schema Outline</h3>
          <button id="btn_fetch_schema" class="btn-secondary" style="font-size: 11px; padding: 4px 8px;">
            <span>Auto-Fetch</span>
            <div class="loader hidden" id="schema_loader" style="width: 10px; height: 10px; border-width: 1px;"></div>
          </button>
        </div>
        <textarea id="schema_text" rows="5" placeholder="Connect to DB or type schema manually..."></textarea>
      </div>

      <div class="config-section">
        <h3>Examples</h3>
        <button class="btn-example" onclick="setExample('List top 3 employees by salary.')">Top 3 Salaries</button>
        <button class="btn-example" onclick="setExample('Show average salary by department.')">Avg Salary by
          Dept</button>
      </div>
    </aside>

    <!-- MAIN CONTENT -->
    <main class="main-content">

      <!-- HERO -->
      <section class="hero-section">
        <h2 class="hero-title">Ask your Database</h2>
        <div class="search-bar glass-panel">
          <input type="text" id="user_query" placeholder="e.g. List top 3 employees by salary..." autocomplete="off">
          <button id="btn_generate" class="btn-primary">
            <span>Generate SQL</span>
            <div class="loader hidden" id="generate_loader"></div>
          </button>
        </div>
      </section>

      <!-- RESULTS AREA -->
      <div class="results-container hidden" id="results_container">

        <div class="sql-display glass-panel">
          <div class="panel-header">
            <h3>Generated Query</h3>
            <div class="actions">
              <span id="safety_badge" class="badge"></span>
              <button id="btn_run" class="btn-secondary" disabled>
                <span>Run Query</span>
                <div class="loader hidden" id="run_loader"></div>
              </button>
            </div>
          </div>
          <div class="code-wrapper">
            <pre><code id="generated_sql" class="fira-code"></code></pre>
          </div>
          <div id="safety_reason" class="error-text hidden"></div>
        </div>

        <div class="table-display glass-panel hidden" id="table_container">
          <div class="panel-header">
            <h3>Query Results</h3>
            <span class="row-count" id="row_count">0 rows</span>
          </div>
          <div class="table-responsive">
            <table id="results_table">
              <!-- Rendered via JS -->
            </table>
          </div>
          <div id="run_error" class="error-text hidden"></div>
        </div>

      </div>

    </main>

  </div>

  <script src="/static/script.js"></script>
</body>

</html>
